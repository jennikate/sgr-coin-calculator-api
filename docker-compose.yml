services:
  db:
    image: postgres:15
    container_name: my_postgres_container
    restart: always
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: myapp_test
    ports:
      - "5544:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
